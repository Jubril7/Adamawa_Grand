{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — Adamawa Grand Hotel{% endblock %}

{% block content %}
<section class="auth-section py-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="auth-card form-card">
          <div class="auth-header text-center mb-4">
            <h3>Welcome Back</h3>
            <p class="text-muted small">Sign in to manage your bookings</p>
          </div>
          <form method="post" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-gold w-100 mt-3">Login</button>
          </form>
          <hr class="my-4">
          <p class="text-center text-muted small">
            New here? <a href="{% url 'accounts:register' %}">Create an account</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
